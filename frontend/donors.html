<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donor Management - Blood Donation System</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="nav-brand">
          <h1>🩸 Blood Donation Management System</h1>
        </div>
        <ul class="nav-links">
          <li><a href="/">Dashboard</a></li>
          <li><a href="/donors" class="active">Donors</a></li>
          <li><a href="/hospitals">Hospitals</a></li>
          <li><a href="/donations">Donations</a></li>
          <li><a href="/requests">Requests</a></li>
        </ul>
      </nav>
    </header>

    <main class="container">
      <div class="page-header">
        <h2>Donor Management</h2>
        <button id="add-donor-btn" class="btn btn-primary">
          Add New Donor
        </button>
      </div>

      <!-- Add/Edit Donor Form (Hidden by default) -->
      <div id="donor-form-section" class="form-section" style="display: none">
        <div class="form-container">
          <h3 id="form-title">Add New Donor</h3>
          <form id="donor-form">
            <input type="hidden" id="donor-id" />

            <div class="form-grid">
              <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required />
              </div>

              <div class="form-group">
                <label for="age">Age *</label>
                <input
                  type="number"
                  id="age"
                  name="age"
                  min="18"
                  max="65"
                  required
                />
              </div>

              <div class="form-group">
                <label for="gender">Gender *</label>
                <select id="gender" name="gender" required>
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>

              <div class="form-group">
                <label for="blood-group">Blood Group *</label>
                <select id="blood-group" name="blood_group" required>
                  <option value="">Select Blood Group</option>
                  <option value="A+">A+</option>
                  <option value="A-">A-</option>
                  <option value="B+">B+</option>
                  <option value="B-">B-</option>
                  <option value="AB+">AB+</option>
                  <option value="AB-">AB-</option>
                  <option value="O+">O+</option>
                  <option value="O-">O-</option>
                </select>
              </div>

              <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" required />
              </div>

              <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required />
              </div>

              <div class="form-group full-width">
                <label for="address">Address *</label>
                <textarea
                  id="address"
                  name="address"
                  rows="3"
                  required
                ></textarea>
              </div>

              <div class="form-group">
                <label for="last-donation-date">Last Donation Date</label>
                <input
                  type="date"
                  id="last-donation-date"
                  name="last_donation_date"
                />
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Save Donor</button>
              <button type="button" id="cancel-form" class="btn btn-secondary">
                Cancel
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Donors List -->
      <div id="donors-section">
        <div class="search-section">
          <input
            type="text"
            id="search-donors"
            placeholder="Search donors by name, email, or blood group..."
          />
        </div>

        <div class="table-container">
          <table id="donors-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Blood Group</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Last Donation</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="8" class="loading">Loading donors...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <footer>
      <p>
        &copy; 2025 Blood Donation Management System. Saving lives, one donation
        at a time.
      </p>
    </footer>

    <script src="js/main.js"></script>
    <script>
      // Load donors when page loads
      document.addEventListener("DOMContentLoaded", () => {
        loadDonors();
        setupDonorFormHandlers();
      });
    </script>
  </body>
</html>
